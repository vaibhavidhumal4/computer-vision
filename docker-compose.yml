version: "3.9"

services:
  food-vision:
    build: .
    container_name: food-vision-app
    ports:
      - "8000:8000"
    volumes:
      - ./model:/app/model        # mount trained weights
      - ./frontend:/app/frontend  # live frontend reload
    environment:
      - PYTHONUNBUFFERED=1
    # --- GPU support (RTX 3050) ---
    # Uncomment the lines below after installing nvidia-container-toolkit
    deploy:
       resources:
         reservations:
           devices:
             - driver: nvidia
               count: 1
               capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
